# Blueprint de Render (https://render.com/docs/blueprint-spec).
#
# pruebatecnica-mockapi se mantiene desplegado como respaldo/demo local (no requiere token),
# pero pruebatecnica-web apunta a la API real que entregó el equipo técnico.
#
# IMPORTANTE: ApiSettings__BearerToken NO se declara aquí a propósito. Este archivo se sube a
# GitHub, así que cualquier valor puesto en "envVars" con "value:" queda en el historial del
# repo. El token se configura únicamente en el dashboard de Render (Environment del servicio
# pruebatecnica-web) — Render solo re-sincroniza las claves que este blueprint declara
# explícitamente, así que una variable ausente aquí nunca se sobrescribe ni se expone.
services:
  - type: web
    name: pruebatecnica-mockapi
    runtime: docker
    dockerfilePath: ./src/PruebaTecnica.MockApi/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health

  - type: web
    name: pruebatecnica-web
    runtime: docker
    dockerfilePath: ./src/PruebaTecnica.Web/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: ApiSettings__Endpoint
        value: /DocumentosFillsCombos
      - key: ApiSettings__TimeoutSeconds
        value: "20"
      - key: ApiSettings__BaseUrl
        value: https://mainserver.ziursoftware.com/Ziur.API/basedatos_01/ZiurServiceRest.svc/api
